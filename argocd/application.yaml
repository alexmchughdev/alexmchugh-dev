apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alexmchugh-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/alexmchughdev/k8s-manifests.git
    targetRevision: main
    path: apps/alexmchugh-dev/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: alexmchugh-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
