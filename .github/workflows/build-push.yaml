name: Build & Push

# Builds the website image on every commit to main and pushes it to GHCR
# tagged by short SHA. A follow-up job clones the central k8s-manifests
# repo via SSH deploy key and bumps the image tag in
# apps/alexmchugh-dev/overlays/production, which ArgoCD reconciles into
# the cluster. Mirrors the dfx-tag-generator pipeline.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/github.json'
      - '**/*.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/alexmchughdev/alexmchugh-dev

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    name: Update Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH for manifest repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MANIFEST_DEPLOY_KEY }}

      - name: Clone manifest repo
        run: |
          git clone git@github.com:alexmchughdev/k8s-manifests.git
          cd k8s-manifests
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

      - name: Install kustomize
        env:
          KUSTOMIZE_VERSION: v5.4.3
        run: |
          curl -fsSL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            -o kustomize.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Bump image tag in overlay
        run: |
          cd k8s-manifests/apps/alexmchugh-dev/overlays/production
          kustomize edit set image \
            ghcr.io/alexmchughdev/alexmchugh-dev=ghcr.io/alexmchughdev/alexmchugh-dev:sha-${{ needs.build-and-push.outputs.short_sha }}

      - name: Commit and push
        run: |
          cd k8s-manifests
          git add apps/alexmchugh-dev/
          git diff --staged --quiet || git commit -m "ci: bump alexmchugh-dev to sha-${{ needs.build-and-push.outputs.short_sha }}

          Source: ${{ github.repository }}@${{ github.sha }}"
          git push
